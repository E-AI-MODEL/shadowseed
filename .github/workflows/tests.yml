name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    name: unit tests without model download
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest -q

  model-smoke:
    name: optional real model smoke test
    runs-on: ubuntu-latest
    needs: pytest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install model dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,models]"

      - name: Run model smoke test
        run: python -m pytest -q tests/test_model_optional.py
