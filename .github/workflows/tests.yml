name: tests

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  pytest:
    name: unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest -q

  ssl-gap-suite:
    name: SSL 4.5 Gap-Test Suite
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run SSL Gap Suite
        run: |
          python -m shadowseed.cli run-gap-suite

      - name: Upload SSL results
        uses: actions/upload-artifact@v4
        with:
          name: ssl45-gap-suite-results
          path: results/ssl45_gap_suite.json
          if-no-files-found: error

  ssl-false-positive-suite:
    name: SSL 4.5 false-positive controls
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run false-positive controls
        run: |
          python -m shadowseed.cli run-false-positive-suite

      - name: Upload false-positive results
        uses: actions/upload-artifact@v4
        with:
          name: ssl45-false-positive-results
          path: results/ssl45_false_positive_suite.json
          if-no-files-found: error

  ssl-benefit-suite:
    name: SSL 4.5 Benefit Suite
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run benefit suite
        run: |
          python -m shadowseed.cli run-benefit-suite

      - name: Upload benefit results
        uses: actions/upload-artifact@v4
        with:
          name: ssl45-benefit-results
          path: results/ssl45_benefit_suite.json
          if-no-files-found: error

  ssl-model-benefit-suite:
    name: SSL 4.5 Model Benefit Suite smoke
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run model benefit fixture smoke
        run: |
          python -m shadowseed.cli run-model-benefit-suite --backend fixture

      - name: Upload model benefit results
        uses: actions/upload-artifact@v4
        with:
          name: ssl45-model-benefit-results
          path: results/ssl45_model_benefit_suite.json
          if-no-files-found: error

  ssl-analysis:
    name: SSL 4.5 analysis report
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate benchmark inputs for analysis
        run: |
          python -m shadowseed.cli run-gap-suite
          python -m shadowseed.cli run-false-positive-suite
          python -m shadowseed.cli run-benefit-suite
          python -m shadowseed.cli run-model-benefit-suite --backend fixture

      - name: Analyze benchmark outputs
        run: |
          python -m shadowseed.cli analyze-results

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: ssl45-analysis-report
          path: results/analysis
          if-no-files-found: error

      - name: Publish analysis to GitHub Wiki
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.wiki.git"
          if ! git clone "$WIKI_URL" wiki; then
            echo "Wiki repo not available. Enable Wiki in repo settings and create the first page once."
            exit 0
          fi
          cp results/analysis/analysis_report.md wiki/SSL-45-Analysis.md
          cp results/analysis/analysis_summary.json wiki/SSL-45-Analysis-Summary.json
          cp results/analysis/coverage.svg wiki/coverage.svg
          cp results/analysis/false_positive.svg wiki/false_positive.svg
          if [ ! -f wiki/Home.md ]; then
            printf '# Shadow Seed Learning 4.5\n\n- [SSL 4.5 Analysis](SSL-45-Analysis)\n- [SSL 4.5 Analysis Summary JSON](SSL-45-Analysis-Summary)\n' > wiki/Home.md
          fi
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Home.md SSL-45-Analysis.md SSL-45-Analysis-Summary.json coverage.svg false_positive.svg
          if git diff --cached --quiet; then
            echo "No wiki changes."
          else
            git commit -m "Update SSL 4.5 analysis wiki (${SHA})"
            git push
          fi

  nlp-smoke:
    name: NLP AbsenceBench smoke
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run NLP smoke test
        run: |
          python -m shadowseed.cli run-nlp-smoke --output absencebench_smoke.json

      - name: Upload NLP smoke results
        uses: actions/upload-artifact@v4
        with:
          name: nlp-smoke-results
          path: benchmarks/results/absencebench_smoke.json
          if-no-files-found: error

  benchmark-matrix:
    name: SSL turn matrix
    runs-on: ubuntu-latest
    needs: pytest
    strategy:
      matrix:
        turns: [1, 2, 3, 5, 8]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run SSL turn matrix
        run: |
          python -m shadowseed.cli run-gap-suite \
            --turns ${{ matrix.turns }} \
            --output results/ssl45_gap_suite_turns_${{ matrix.turns }}.json

      - name: Upload SSL turn matrix result
        uses: actions/upload-artifact@v4
        with:
          name: ssl45-gap-suite-turns-${{ matrix.turns }}
          path: results/ssl45_gap_suite_turns_${{ matrix.turns }}.json
          if-no-files-found: error
