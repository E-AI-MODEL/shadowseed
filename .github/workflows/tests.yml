name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    name: unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest -q

  ssl-gap-suite:
    name: SSL 4.5 Gap-Test Suite
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run SSL Gap Suite
        run: |
          python -m shadowseed.cli run-gap-suite

  nlp-smoke:
    name: NLP AbsenceBench smoke
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run NLP smoke test
        run: |
          python -m shadowseed.cli run-nlp-smoke
