name: Checks en benchmark-resultaten

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: "01 Codecheck: werkt de Python-code?"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Installeer test-dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Draai unit tests
        run: python -m pytest -q

  ssl-gap-suite:
    name: "02 Gap Finder: vindt SSL ontbrekende punten?"
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Draai Gap Finder suite
        run: |
          python -m shadowseed.cli run-gap-suite

      - name: Upload Gap Finder resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 02-gap-finder-results
          path: results/ssl45_gap_suite.json
          if-no-files-found: error

  ssl-false-positive-suite:
    name: "03 Rustig blijven: voegt SSL geen onzin toe?"
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Draai false-positive controle
        run: |
          python -m shadowseed.cli run-false-positive-suite

      - name: Upload false-positive resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 03-false-positive-results
          path: results/ssl45_false_positive_suite.json
          if-no-files-found: error

  ssl-benefit-suite:
    name: "04 Antwoordwinst: wordt een antwoord completer met SSL?"
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Draai antwoordwinst suite
        run: |
          python -m shadowseed.cli run-benefit-suite

      - name: Upload antwoordwinst resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 04-answer-benefit-results
          path: results/ssl45_benefit_suite.json
          if-no-files-found: error

  ssl-model-benefit-suite:
    name: "05 Model smoke: werkt dezelfde modeltest met en zonder SSL?"
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Draai model-benefit fixture smoke
        run: |
          python -m shadowseed.cli run-model-benefit-suite --backend fixture

      - name: Upload model smoke resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 05-model-smoke-results
          path: results/ssl45_model_benefit_suite.json
          if-no-files-found: error

  blind-benchmark-smoke:
    name: "06 Blind test: kan SSL scoren zonder labels vooraf te zien?"
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Maak tijdelijke private labels
        run: |
          mkdir -p benchmarks/private
          cat > benchmarks/private/blind_suite_labels.smoke.json <<'JSON'
          {
            "version": "blind-0.1-smoke-labels",
            "labels": [
              {
                "id": "BLIND_HIST_001",
                "expected_gaps": [
                  "Koloniale of internationale afhankelijkheden in de economische uitleg."
                ],
                "must_not_add": [
                  "Onbewezen directe oorzaak zonder bron."
                ]
              },
              {
                "id": "BLIND_LAW_001",
                "expected_gaps": [
                  "Rechtsbevoegdheid bij partijen uit verschillende landen.",
                  "Toepasselijk recht bij grensoverschrijdende afspraken."
                ],
                "must_not_add": [
                  "Automatische strafrechtelijke aansprakelijkheid van de aanbieder."
                ]
              },
              {
                "id": "BLIND_ARCH_001",
                "expected_gaps": [
                  "Privacyrisico bij verwerking van gevoelige gebruikersdata.",
                  "Misbruikbeperking op publieke API-endpoints."
                ],
                "must_not_add": [
                  "Verplichte blockchainopslag voor medische data."
                ]
              },
              {
                "id": "BLIND_ETH_001",
                "expected_gaps": [
                  "Geïnformeerde toestemming van betrokken personen.",
                  "Privacybescherming bij medische gegevensverwerking."
                ],
                "must_not_add": [
                  "Toestemming is nooit nodig bij medisch onderzoek."
                ]
              },
              {
                "id": "BLIND_EDU_001",
                "expected_gaps": [
                  "Effect op kansengelijkheid tussen verschillende leerlinggroepen.",
                  "Werkdruk voor docenten bij uitvoering van het beleid."
                ],
                "must_not_add": [
                  "Alle leerlingen halen automatisch hogere cijfers."
                ]
              }
            ]
          }
          JSON

      - name: Draai blinde smoke-test
        run: |
          python -m shadowseed.cli run-blind-benchmark \
            --input src/shadowseed/data/blind_suite_public.json \
            --labels benchmarks/private/blind_suite_labels.smoke.json \
            --output results/blind_benchmark.json \
            --turns 3

      - name: Upload blinde benchmark resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 06-blind-benchmark-results
          path: results/blind_benchmark.json
          if-no-files-found: error

  ssl-analysis:
    name: "07 Rapport: vat de belangrijkste resultaten samen"
    runs-on: ubuntu-latest
    needs:
      - ssl-gap-suite
      - ssl-false-positive-suite
      - ssl-benefit-suite
      - ssl-model-benefit-suite
      - blind-benchmark-smoke

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download benchmark-artifacts uit eerdere jobs
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Bouw provenance-veilige results-map uit artifacts
        env:
          SOURCE_WORKFLOW: Checks en benchmark-resultaten
          SOURCE_RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          rm -rf results
          mkdir -p results results/artifacts
          cp -R downloaded-artifacts/. results/artifacts/

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import re
          import shutil
          from pathlib import Path

          source = Path("downloaded-artifacts")
          results = Path("results")

          allowed_suffixes = {".json", ".md", ".svg"}
          manifest = {
              "source_workflow": os.environ.get("SOURCE_WORKFLOW"),
              "source_run_id": os.environ.get("SOURCE_RUN_ID"),
              "repository": os.environ.get("REPOSITORY"),
              "published_via": ["analysis-job"],
              "copied_files": [],
          }
          used_names: set[str] = set()

          def safe_name(value: str) -> str:
              cleaned = re.sub(r"[^A-Za-z0-9_.-]+", "-", value).strip("-")
              return cleaned or "artifact"

          for file_path in sorted(path for path in source.rglob("*") if path.is_file()):
              if file_path.suffix.lower() not in allowed_suffixes:
                  continue
              relative = file_path.relative_to(source)
              artifact = relative.parts[0] if relative.parts else "artifact"
              base = file_path.name
              target_name = base
              if target_name in used_names:
                  target_name = f"{safe_name(artifact)}__{base}"
              counter = 2
              while target_name in used_names:
                  stem = Path(base).stem
                  suffix = Path(base).suffix
                  target_name = f"{safe_name(artifact)}__{stem}_{counter}{suffix}"
                  counter += 1
              used_names.add(target_name)
              target = results / target_name
              shutil.copy2(file_path, target)
              manifest["copied_files"].append(
                  {
                      "artifact": artifact,
                      "source_path": str(relative),
                      "results_path": str(target.relative_to(results.parent)),
                      "original_artifact_path": str(Path("results/artifacts") / relative),
                      "bytes": file_path.stat().st_size,
                  }
              )

          (results / "manifest.json").write_text(
              json.dumps(manifest, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Maak analyserapport
        run: |
          python -m shadowseed.cli analyze-results

      - name: Upload analyserapport
        uses: actions/upload-artifact@v4
        with:
          name: 07-analysis-report
          path: results/analysis
          if-no-files-found: error

  nlp-smoke:
    name: "08 AbsenceBench rooktest: werkt de lokale dataset-run?"
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Draai AbsenceBench rooktest
        run: |
          python -m shadowseed.cli run-nlp-smoke --output absencebench_smoke.json

      - name: Upload AbsenceBench resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 08-absencebench-smoke-results
          path: benchmarks/results/absencebench_smoke.json
          if-no-files-found: error

  benchmark-matrix:
    name: "09 Herhalingstest: wat gebeurt er bij meer SSL-rondes?"
    runs-on: ubuntu-latest
    needs: pytest
    strategy:
      matrix:
        turns: [1, 2, 3, 5, 8]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Draai herhalingstest
        run: |
          python -m shadowseed.cli run-gap-suite \
            --turns ${{ matrix.turns }} \
            --output results/ssl45_gap_suite_turns_${{ matrix.turns }}.json

      - name: Upload herhalingstest resultaat
        uses: actions/upload-artifact@v4
        with:
          name: 09-repeat-test-turns-${{ matrix.turns }}
          path: results/ssl45_gap_suite_turns_${{ matrix.turns }}.json
          if-no-files-found: error