name: Publish Existing SLM Conclusion

on:
  workflow_dispatch:
    inputs:
      slm_run_id:
        description: "Existing SLM Model Benefit Run ID. Leave empty to use the latest successful SLM run."
        required: false
        default: ""

permissions:
  contents: write
  actions: read

jobs:
  publish-existing-slm-conclusion:
    name: Publish conclusion from existing SLM run
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Resolve SLM run ID
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROVIDED_RUN_ID: ${{ inputs.slm_run_id }}
        run: |
          set -e
          if [ -n "$PROVIDED_RUN_ID" ]; then
            RUN_ID="$PROVIDED_RUN_ID"
          else
            RUN_ID=$(gh run list \
              --workflow slm-model-benefit.yml \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful SLM Model Benefit Run found. Run the SLM workflow first or provide slm_run_id."
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Using SLM run ID: $RUN_ID"

      - name: Download existing SLM artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
        run: |
          set -e
          mkdir -p downloaded results
          gh run download "$RUN_ID" \
            --name ssl45-slm-model-benefit-results \
            --dir downloaded/slm-model-benefit
          cp downloaded/slm-model-benefit/ssl45_model_benefit_suite.json results/ssl45_model_benefit_suite.json

      - name: Generate companion benchmark outputs
        run: |
          python -m shadowseed.cli run-gap-suite
          python -m shadowseed.cli run-false-positive-suite
          python -m shadowseed.cli run-benefit-suite

      - name: Re-analyze existing SLM result
        run: |
          python -m shadowseed.cli analyze-results

      - name: Build first conclusion page
        env:
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
          SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = json.loads(Path('results/analysis/analysis_summary.json').read_text(encoding='utf-8'))
          conclusion = summary.get('conclusion', {})
          metrics = conclusion.get('metrics', {})
          model_summary = summary.get('model_benefit') or {}
          backend = conclusion.get('backend') or model_summary.get('backend', 'unknown')

          lines = [
              '# Eerste conclusie op basis van bestaande SLM-run',
              '',
              f"**{conclusion.get('headline', 'Geen conclusie beschikbaar.')}**",
              '',
              conclusion.get('body', ''),
              '',
              '## Run',
              '',
              '| Veld | Waarde |',
              '|---|---|',
              f"| SLM run ID | {os.environ.get('RUN_ID', '')} |",
              f"| Backend | {backend} |",
              f"| Commit analyseworkflow | {os.environ.get('SHA', '')} |",
              '',
              '## Kerncijfers',
              '',
              '| Metric | Waarde |',
              '|---|---:|',
              f"| Gap mean scenario score | {metrics.get('gap_mean_scenario_score', 'n/a')} |",
              f"| Gap promoted hits | {metrics.get('gap_promoted_hits', 'n/a')} |",
              f"| Promoted false-positive rate | {metrics.get('promoted_false_positive_rate', 'n/a')} |",
              f"| Benefit coverage delta | {metrics.get('benefit_coverage_delta', 'n/a')} |",
              f"| Model benefit coverage delta | {metrics.get('model_benefit_coverage_delta', 'n/a')} |",
              f"| Model unsupported SSL addition rate | {metrics.get('model_unsupported_ssl_addition_rate', 'n/a')} |",
              f"| Mean answer length delta words | {metrics.get('mean_answer_length_delta_words', 'n/a')} |",
              '',
              '## Onderbouwing',
              '',
          ]
          for item in conclusion.get('supporting_observations', []):
              lines.append(f'- {item}')
          lines.extend([
              '',
              '## Grens van de claim',
              '',
              conclusion.get('claim_boundary', ''),
              '',
              '## Links',
              '',
              '- [SLM Model Benefit Analysis](SLM-Model-Benefit-Analysis)',
              '- [Raw model benefit JSON](https://raw.githubusercontent.com/wiki/E-AI-MODEL/shadowseed/SLM-Model-Benefit-Raw.json)',
              '- [SLM Model Benefit](SLM-Model-Benefit)',
              '',
          ])
          Path('results/analysis/SLM-First-Conclusion.md').write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Upload refreshed conclusion artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ssl45-existing-slm-conclusion
          path: |
            results/analysis
            results/ssl45_model_benefit_suite.json
          if-no-files-found: error

      - name: Publish refreshed conclusion to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
        run: |
          set -e
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.wiki.git"
          if ! git clone "$WIKI_URL" wiki; then
            echo "Wiki repo not available. Enable Wiki in repo settings and create the first page once."
            exit 0
          fi
          cp results/analysis/analysis_report.md wiki/SLM-Model-Benefit-Analysis.md
          cp results/analysis/analysis_summary.json wiki/SLM-Model-Benefit-Analysis-Summary.json
          cp results/analysis/coverage.svg wiki/slm_coverage.svg
          cp results/analysis/false_positive.svg wiki/slm_false_positive.svg
          cp results/analysis/SLM-First-Conclusion.md wiki/SLM-First-Conclusion.md
          cp results/ssl45_model_benefit_suite.json wiki/SLM-Model-Benefit-Raw.json
          if [ ! -f wiki/Home.md ]; then
            printf '# Shadow Seed Learning 4.5\n\n- [SLM Model Benefit](SLM-Model-Benefit)\n- [SLM First Conclusion](SLM-First-Conclusion)\n' > wiki/Home.md
          elif ! grep -q "SLM-First-Conclusion" wiki/Home.md; then
            printf '\n- [SLM First Conclusion](SLM-First-Conclusion)\n' >> wiki/Home.md
          fi
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Home.md SLM-First-Conclusion.md SLM-Model-Benefit-Analysis.md SLM-Model-Benefit-Analysis-Summary.json SLM-Model-Benefit-Raw.json slm_coverage.svg slm_false_positive.svg
          if git diff --cached --quiet; then
            echo "No wiki changes."
          else
            git commit -m "Publish first SLM conclusion from run ${RUN_ID} (${SHA})"
            git push
          fi
