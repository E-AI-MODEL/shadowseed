name: Deploy Dashboard (manual fallback only)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build fallback dashboard snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site from repository files
        run: |
          # Manual fallback only.
          # The canonical public results route is publish-test-results.yml,
          # which rebuilds results/latest from trusted benchmark artifacts.
          # This workflow deploys the repository's current site/results files
          # without rebuilding a provenance-safe artifact snapshot.
          mkdir -p _site
          cp -r site/* _site/
          mkdir -p _site/results
          cp -r results/* _site/results/ || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy fallback dashboard snapshot
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
