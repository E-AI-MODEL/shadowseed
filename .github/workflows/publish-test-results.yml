name: Publiceer testresultaten naar Wiki en Pages

on:
  workflow_run:
    workflows: ["Checks en benchmark-resultaten"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    name: "Publicatie: verzamel artifacts en werk Wiki + Pages bij"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push'
      )

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download artifacts uit laatste standaardrun
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          mkdir -p downloaded-artifacts
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RUN_ID=$(gh run list --workflow tests.yml --branch main --event push --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          else
            RUN_ID="$WORKFLOW_RUN_ID"
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful trusted tests push run found."
            exit 1
          fi
          echo "Downloading artifacts from tests run $RUN_ID"
          echo "TEST_RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --dir downloaded-artifacts

      - name: Bouw results/latest en manifest
        run: |
          set -euo pipefail
          rm -rf results/latest results/artifacts
          mkdir -p results/latest results/artifacts
          cp -R downloaded-artifacts/. results/artifacts/

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import re
          import shutil
          from pathlib import Path

          source = Path("downloaded-artifacts")
          latest = Path("results/latest")
          latest.mkdir(parents=True, exist_ok=True)

          allowed_suffixes = {".json", ".md", ".svg"}
          manifest = {
              "source_workflow": "Checks en benchmark-resultaten",
              "source_run_id": os.environ.get("TEST_RUN_ID"),
              "repository": os.environ.get("GITHUB_REPOSITORY"),
              "copied_files": [],
          }
          used_names: set[str] = set()

          def safe_name(value: str) -> str:
              cleaned = re.sub(r"[^A-Za-z0-9_.-]+", "-", value).strip("-")
              return cleaned or "artifact"

          for file_path in sorted(path for path in source.rglob("*") if path.is_file()):
              if file_path.suffix.lower() not in allowed_suffixes:
                  continue
              relative = file_path.relative_to(source)
              artifact = relative.parts[0] if relative.parts else "artifact"
              base = file_path.name
              target_name = base
              if target_name in used_names:
                  target_name = f"{safe_name(artifact)}__{base}"
              counter = 2
              while target_name in used_names:
                  stem = Path(base).stem
                  suffix = Path(base).suffix
                  target_name = f"{safe_name(artifact)}__{stem}_{counter}{suffix}"
                  counter += 1
              used_names.add(target_name)
              target = latest / target_name
              shutil.copy2(file_path, target)
              manifest["copied_files"].append(
                  {
                      "artifact": artifact,
                      "source_path": str(relative),
                      "latest_path": str(target.relative_to(latest.parent)),
                      "original_artifact_path": str(Path("results/artifacts") / relative),
                      "bytes": file_path.stat().st_size,
                  }
              )

          (latest / "manifest.json").write_text(
              json.dumps(manifest, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY

          cat > results/latest/README.md <<'MD'
          # Latest test artifacts

          Deze map is opgebouwd uit de meest recente geslaagde standaardrun `Checks en benchmark-resultaten`.

          De map bevat een platte kopie van de belangrijkste JSON-, Markdown- en SVG-bestanden uit de test-artifacts. Gebruik `manifest.json` om te zien uit welk artifact elk bestand komt.

          Bij dubbele bestandsnamen krijgt het latere bestand een prefix met de artifactnaam. De originele artifactstructuur blijft behouden in `results/artifacts/`.
          MD

      - name: Maak centraal analyserapport
        run: |
          set -euo pipefail
          python -m shadowseed.cli analyze-results \
            --results-dir results/latest \
            --output-dir results/latest/analysis
          cp results/latest/analysis/analysis_summary.json results/latest/summary.json
          cp results/latest/analysis/analysis_report.md results/latest/analysis_report.md
          cp results/latest/analysis/coverage.svg results/latest/coverage.svg
          cp results/latest/analysis/false_positive.svg results/latest/false_positive.svg

      - name: Publiceer naar GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.wiki.git"
          if ! git clone "$WIKI_URL" wiki; then
            echo "Wiki repo not available. Enable Wiki in repo settings and create the first page once."
            exit 0
          fi
          cp results/latest/analysis_report.md wiki/SSL-45-Analysis.md
          cp results/latest/summary.json wiki/SSL-45-Analysis-Summary.json
          cp results/latest/coverage.svg wiki/coverage.svg
          cp results/latest/false_positive.svg wiki/false_positive.svg
          mkdir -p wiki/results/latest wiki/results/artifacts
          cp -R results/latest/. wiki/results/latest/
          cp -R results/artifacts/. wiki/results/artifacts/
          cp docs/wiki/*.md wiki/ || true
          cat > wiki/Latest-Test-Results.md <<'MD'
          # Latest Test Results

          Deze pagina wordt automatisch bijgewerkt na een geslaagde standaardrun op `main`.

          Belangrijkste bestanden:

          - [SSL 4.5 Analysis](SSL-45-Analysis)
          - [SSL 4.5 Analysis Summary JSON](SSL-45-Analysis-Summary)
          - `results/latest/manifest.json`
          - `results/latest/`
          - `results/artifacts/`

          `results/latest/manifest.json` laat zien uit welk artifact elk gepubliceerd bestand komt. De `results/artifacts/` map bewaart de originele artifactstructuur.
          MD
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No wiki changes."
          else
            git commit -m "Publish latest test results (${SHA})"
            git push
          fi

      - name: Bouw Pages-dashboard
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -r site/. _site/
          mkdir -p _site/results
          cp -R results/. _site/results/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Zet dashboard live op GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
