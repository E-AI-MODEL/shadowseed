name: Publish Test Results

on:
  workflow_run:
    workflows: ["tests"]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    name: Publish latest benchmark outputs
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download artifacts from latest tests run
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          mkdir -p downloaded-artifacts
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RUN_ID=$(gh run list --workflow tests.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          else
            RUN_ID="$WORKFLOW_RUN_ID"
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful tests run found."
            exit 1
          fi
          echo "Downloading artifacts from tests run $RUN_ID"
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --dir downloaded-artifacts

      - name: Build latest results folder
        run: |
          set -euo pipefail
          rm -rf results/latest results/artifacts
          mkdir -p results/latest results/artifacts
          cp -R downloaded-artifacts/. results/artifacts/

          find downloaded-artifacts -type f -name '*.json' -print | while read -r file; do
            base=$(basename "$file")
            cp "$file" "results/latest/$base"
          done

          find downloaded-artifacts -type f \( -name '*.md' -o -name '*.svg' \) -print | while read -r file; do
            base=$(basename "$file")
            cp "$file" "results/latest/$base"
          done

          cat > results/latest/README.md <<'MD'
          # Latest test artifacts

          Deze map is opgebouwd uit de meest recente geslaagde `tests` workflow-run.

          De map bevat de JSON-, Markdown- en SVG-bestanden uit alle test-artifacts die door de workflow zijn geupload. Gebruik `results/artifacts/` voor de originele artifactstructuur.
          MD

      - name: Regenerate combined analysis from gathered outputs
        run: |
          set -euo pipefail
          python -m shadowseed.cli analyze-results \
            --results-dir results/latest \
            --output-dir results/latest/analysis
          cp results/latest/analysis/analysis_summary.json results/latest/summary.json
          cp results/latest/analysis/analysis_report.md results/latest/analysis_report.md
          cp results/latest/analysis/coverage.svg results/latest/coverage.svg
          cp results/latest/analysis/false_positive.svg results/latest/false_positive.svg

      - name: Publish results to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.wiki.git"
          if ! git clone "$WIKI_URL" wiki; then
            echo "Wiki repo not available. Enable Wiki in repo settings and create the first page once."
            exit 0
          fi
          cp results/latest/analysis_report.md wiki/SSL-45-Analysis.md
          cp results/latest/summary.json wiki/SSL-45-Analysis-Summary.json
          cp results/latest/coverage.svg wiki/coverage.svg
          cp results/latest/false_positive.svg wiki/false_positive.svg
          mkdir -p wiki/results/latest wiki/results/artifacts
          cp -R results/latest/. wiki/results/latest/
          cp -R results/artifacts/. wiki/results/artifacts/
          cp docs/wiki/*.md wiki/ || true
          cat > wiki/Latest-Test-Results.md <<'MD'
          # Latest Test Results

          Deze pagina wordt automatisch bijgewerkt na een geslaagde `tests` workflow-run op `main`.

          Belangrijkste bestanden:

          - [SSL 4.5 Analysis](SSL-45-Analysis)
          - [SSL 4.5 Analysis Summary JSON](SSL-45-Analysis-Summary)
          - `results/latest/`
          - `results/artifacts/`

          De `results/artifacts/` map bewaart de originele artifactstructuur. De `results/latest/` map bevat een platte kopie van de belangrijkste JSON-, Markdown- en SVG-bestanden.
          MD
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No wiki changes."
          else
            git commit -m "Publish latest test results (${SHA})"
            git push
          fi

      - name: Prepare Pages site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -r site/. _site/
          mkdir -p _site/results
          cp -R results/. _site/results/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
